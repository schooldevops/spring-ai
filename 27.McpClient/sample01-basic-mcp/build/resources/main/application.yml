spring:
  application:
    name: mcp-basic-sample
  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      chat:
        options:
          model: gpt-4o-mini
    mcp:
      client:
        enabled: true
        basic-server:
          transport:
            stdio:
              command: "java"
              args:
                [
                  "-jar",
