spring:
  application:
    name: chatmodel-demo
  
  # OpenAI 설정
  # ai:
  #   openai:
  #     # 환경 변수에서 API Key 읽기 (권장)
  #     api-key: ${OPENAI_API_KEY:your-api-key-here}
  #     chat:
  #       options:
  #         model: gpt-4          # 또는 gpt-3.5-turbo
  #         temperature: 0.7      # 0.0 ~ 2.0 (창의성 조절)
  #         max-tokens: 1000      # 최대 토큰 수
  #         top-p: 1.0
  #         frequency-penalty: 0.0
  #         presence-penalty: 0.0

  # Ollama 설정
  ai:
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      # Chat 설정
      chat:
        options:
          model: exaone-deep:latest 
          temperature: 0.7
      # Embedding 설정
      embedding:
        options:
          model: nomic-embed-text # 또는 mxbai-embed-large, all-minilm


server:
  port: 9000

logging:
  level:
    com.example.springai: DEBUG
    org.springframework.ai: DEBUG

